<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>ROM - Tee Hong Aun & Pang Sheen Yie</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: #fafafa;
}

.hero {
    position: relative;
    overflow: hidden;
    background: black;
}

.hero img {
    width: 100%;
    height: 80vh;
    object-fit: cover;
    filter: brightness(50%);
    max-width: 100%;
    display: block;
}

.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}

.section {
    padding: 40px 20px;
}

.button {
    display: inline-block;
    padding: 12px 20px;
    margin: 10px;
    background: #d4af37;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

.toggle-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    background: black;
    color: white;
    padding: 10px;
    cursor: pointer;
}

/* LUXURY ENHANCEMENTS */
body { background:#000; color:#fff; }
.hero { height:100vh; }
.hero img { height:100vh; filter: brightness(60%); }
.overlay { backdrop-filter: blur(8px); background: rgba(0,0,0,0.25); padding: 25px 30px; border-radius: 12px; }
.button { background: linear-gradient(135deg,#d4af37,#b8962e); box-shadow:0 4px 15px rgba(0,0,0,0.3); }
.button:hover { opacity:0.9; }
.countdown { margin-top:15px; font-size:20px; }
canvas { position:fixed; top:0; left:0; z-index:0; }
.hero, .overlay { position:relative; z-index:1; }

/* PETALS */
.petal { position: fixed; top: -10px; width: 12px; height: 12px; background: radial-gradient(circle at 30% 30%, #ffd6e7, #ff7aa8); border-radius: 50% 50% 50% 0; opacity: 0.8; transform: rotate(45deg); pointer-events:none; z-index:0; }
@keyframes fall {
  0% { transform: translateY(-10px) rotate(45deg); opacity: 0.9; }
  100% { transform: translateY(110vh) rotate(405deg); opacity: 0.6; }
}

/* GALLERY */
.gallery { padding: 40px 20px; background:#000; }
.gallery-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap:10px; max-width:900px; margin:0 auto; }
.gallery-grid img { width:100%; height:140px; object-fit:cover; border-radius:10px; }

/* MUSIC BTN */
.music-btn { position: fixed; left: 15px; top: 15px; background: rgba(0,0,0,0.6); color:#fff; padding:10px; border-radius:6px; cursor:pointer; z-index:2; }
</style>

<script>
function toggleLang() {
    let en = document.getElementById("en");
    let cn = document.getElementById("cn");

    if (en.style.display === "none") {
        en.style.display = "block";
        cn.style.display = "none";
    } else {
        en.style.display = "none";
        cn.style.display = "block";
    }
}
</script>

</head>

<body onload="enableAutoPlayOnce()">

<canvas id="particles"></canvas>

<div class="toggle-btn" onclick="toggleLang()">中文 / EN</div>
<div class="music-btn" onclick="toggleMusic()">🎵 Music</div>

<div class="hero">

        <img width="120" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://forms.gle/E4uDsY7RX2Z1GBa17">
    </div>
</div>

<div id="en">
    <div class="section">
        <h2>💍 You're Invited</h2>
        <p>Join us for our ROM ceremony</p>
    </div>

    <a class="button" href="https://maps.app.goo.gl/iPYTMqg9r8xZaocq5" target="_blank">📍 Location</a>
    <a class="button" href="https://forms.gle/E4uDsY7RX2Z1GBa17" target="_blank">💌 RSVP</a>
</div>

<div id="cn" style="display:none;">
    <div class="section">
        <h2>💍 邀请函</h2>
        <p>诚邀您出席我们的注册结婚仪式</p>
    </div>

    <a class="button" href="https://maps.app.goo.gl/iPYTMqg9r8xZaocq5" target="_blank">📍 地点</a>
    <a class="button" href="https://forms.gle/E4uDsY7RX2Z1GBa17" target="_blank">💌 回复</a>
</div>

<div class="gallery">
  <h2>📸 Our Moments</h2>
  <div class="gallery-grid">
    <img src="photo.jpg">
    <img src="photo.jpg">
    <img src="photo.jpg">
    <img src="photo.jpg">
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function toggleMusic(){
  const music = document.getElementById('bgMusic');
  if(music.paused){ music.play(); } else { music.pause(); }
}

function enableAutoPlayOnce(){
  const music = document.getElementById('bgMusic');
  const playOnce = () => {
    music.play().catch(()=>{});
    document.removeEventListener('click', playOnce);
    document.removeEventListener('touchstart', playOnce);
  };
  document.addEventListener('click', playOnce);
  document.addEventListener('touchstart', playOnce);
}

/* PETALS GENERATOR */
function createPetal(){
  const petal = document.createElement('div');
  petal.classList.add('petal');
  petal.style.left = Math.random()*window.innerWidth + 'px';
  petal.style.animation = 'fall ' + (5+Math.random()*5) + 's linear';
  document.body.appendChild(petal);
  setTimeout(()=>petal.remove(),10000);
}
setInterval(createPetal, 300);
</script>

<script>
/* COUNTDOWN */
const targetDate = new Date("June 27, 2026 10:00:00").getTime();
setInterval(() => {
    const now = new Date().getTime();
    const gap = targetDate - now;
    const d = Math.floor(gap / (1000 * 60 * 60 * 24));
    const h = Math.floor((gap / (1000 * 60 * 60)) % 24);
    const m = Math.floor((gap / (1000 * 60)) % 60);
    const s = Math.floor((gap / 1000) % 60);
    document.getElementById("countdown").innerText =
        d + " Days " + h + " Hours " + m + " Min " + s + " Sec";
}, 1000);
